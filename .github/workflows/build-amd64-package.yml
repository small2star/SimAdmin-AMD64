name: Build-AMD64-Package

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Sync-Upstream]
    types: [completed]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  build-amd64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read VERSION
        id: version
        run: |
          V=$(cat VERSION | tr -d "[:space:]")
          echo "version=$V" >> $GITHUB_OUTPUT

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq musl-tools upx-ucl

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-amd64-musl-${{ hashFiles('**/Cargo.lock') }}

      - name: Build backend
        working-directory: backend
        run: |
          export CC_X86_64_UNKNOWN_LINUX_MUSL=musl-gcc
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc
          export SQLITE3_STATIC=1
          export LIBSQLITE3_SYS_USE_PKG_CONFIG=0
          cargo build --release --target x86_64-unknown-linux-musl

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install
          pnpm build

      - name: Package OTA
        id: package
        run: |
          mkdir -p release
          TMP=$(mktemp -d)
          cp backend/target/x86_64-unknown-linux-musl/release/simadmin $TMP/
          cp -r frontend/dist $TMP/www
          tar -czf release/simadmin-amd64.tar.gz -C $TMP .
          rm -rf $TMP
          OM=$(md5sum release/simadmin-amd64.tar.gz | cut -d" " -f1)
          echo "ota_file=release/simadmin-amd64.tar.gz" >> $GITHUB_OUTPUT
          echo "ota_md5=$OM" >> $GITHUB_OUTPUT

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: SimAdmin_v${{ steps.version.outputs.version }}_amd64
          files: |
            release/simadmin-amd64.tar.gz
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
